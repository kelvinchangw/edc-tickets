<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDC Tickets</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="order.html">Submit Order</a>
        <a href="status.html">Check Order</a>
        <a href="faq.html">FAQ</a>
        <a href="admin.html">Admin</a>
    </nav>

    <div class="container">
        <div class="loading" id="loading">Loading...</div>

        <div id="content" style="display:none">
            <h1 id="event-name">EDC Las Vegas 2026</h1>
            <p>Submit your ticket order below.</p>

            <div class="card" style="border-color: var(--accent); background: var(--accent-glow);">
                <h2 style="color: var(--accent); margin-bottom: 0.5rem;">One Ticket Per Person</h2>
                <p class="faq-answer" style="margin-bottom: 0;">You cannot submit an order for someone else. Each person must visit this site and submit their own order individually.</p>
            </div>

            <div id="deadline-banner"></div>

            <div class="card">
                <h2>Ticket Types</h2>
                <div id="ticket-list"></div>
            </div>

            <div id="cta-area"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        (async () => {
            try {
                const config = await getConfig();

                const eventName = config.event_name || 'EDC Las Vegas 2026';
                document.getElementById('event-name').textContent = eventName;
                document.title = eventName;

                const deadline = new Date(config.modification_deadline);
                const ordersOpen = config.orders_open === 'true' && isBeforeDeadline(config.modification_deadline);

                // Deadline banner
                const bannerEl = document.getElementById('deadline-banner');
                if (ordersOpen) {
                    bannerEl.className = 'deadline-banner';
                    bannerEl.innerHTML = `
                        <div>Orders open until ${deadline.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })} at ${deadline.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}</div>
                        <div class="countdown">
                            <div class="countdown-segment"><div class="countdown-number" id="cd-days">--</div><div class="countdown-label">Days</div></div>
                            <div class="countdown-segment"><div class="countdown-number" id="cd-hours">--</div><div class="countdown-label">Hours</div></div>
                            <div class="countdown-segment"><div class="countdown-number" id="cd-mins">--</div><div class="countdown-label">Mins</div></div>
                            <div class="countdown-segment"><div class="countdown-number" id="cd-secs">--</div><div class="countdown-label">Secs</div></div>
                        </div>
                    `;

                    function updateCountdown() {
                        const now = new Date();
                        const diff = deadline - now;
                        if (diff <= 0) {
                            clearInterval(countdownInterval);
                            bannerEl.className = 'closed-banner';
                            bannerEl.innerHTML = 'Orders are closed';
                            const ctaArea = document.getElementById('cta-area');
                            ctaArea.innerHTML = '<div class="cta-group"><a href="status.html" class="btn btn-secondary">Check Order Status</a></div>';
                            return;
                        }
                        const days = Math.floor(diff / 86400000);
                        const hours = Math.floor((diff % 86400000) / 3600000);
                        const mins = Math.floor((diff % 3600000) / 60000);
                        const secs = Math.floor((diff % 60000) / 1000);
                        document.getElementById('cd-days').textContent = String(days).padStart(2, '0');
                        document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
                        document.getElementById('cd-mins').textContent = String(mins).padStart(2, '0');
                        document.getElementById('cd-secs').textContent = String(secs).padStart(2, '0');
                    }

                    updateCountdown();
                    const countdownInterval = setInterval(updateCountdown, 1000);
                } else {
                    bannerEl.className = 'closed-banner';
                    bannerEl.textContent = 'Orders are closed';
                }

                // Ticket types
                const ticketList = document.getElementById('ticket-list');
                const types = [
                    { key: 'ga_price', name: 'GA', tag: '' },
                    { key: 'ga_plus_price', name: 'GA+', tag: '' }
                ];

                types.forEach(t => {
                    const price = config[t.key];
                    const div = document.createElement('div');
                    div.className = 'ticket-type';
                    div.innerHTML = `
                        <span>
                            <span class="ticket-name">${t.name}</span>
                            ${t.tag ? `<span class="ticket-tag">${t.tag}</span>` : ''}
                        </span>
                        <span class="ticket-price">${price === 'TBD' ? 'TBD' : '$' + price}</span>
                    `;
                    ticketList.appendChild(div);
                });

                // CTAs
                const ctaArea = document.getElementById('cta-area');
                if (ordersOpen) {
                    ctaArea.innerHTML = `
                        <div class="cta-group">
                            <a href="order.html" class="btn btn-primary">Submit Order</a>
                            <a href="status.html" class="btn btn-secondary">Check Order</a>
                        </div>
                    `;
                } else {
                    ctaArea.innerHTML = `
                        <div class="cta-group">
                            <a href="status.html" class="btn btn-secondary">Check Order Status</a>
                        </div>
                    `;
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (err) {
                document.getElementById('loading').textContent = 'Failed to load. Please refresh.';
                console.error(err);
            }
        })();
    </script>
</body>
</html>
