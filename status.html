<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Order — EDC Tickets</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="order.html">Submit Order</a>
        <a href="status.html" class="active">Check Order</a>
        <a href="admin.html">Admin</a>
    </nav>

    <div class="container">
        <h1>Check Order</h1>
        <p>Enter your name and 4 digit PIN to look up your order.</p>

        <div id="msg" class="message"></div>

        <div id="lookup-area">
            <form id="lookup-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" required placeholder="First name">
                    </div>
                    <div class="form-group">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" required placeholder="Last name">
                    </div>
                </div>

                <div class="form-group">
                    <label for="pin">PIN</label>
                    <input type="number" id="pin" required placeholder="Your 4 digit PIN">
                </div>

                <button type="submit" class="btn btn-primary" id="lookup-btn">Look Up Order</button>
            </form>
        </div>

        <div id="order-area" style="display:none">
            <div class="card">
                <h2>Your Order</h2>
                <div id="order-details"></div>
            </div>

            <div id="screenshot-section" class="card" style="display:none">
                <h2>Zelle Screenshot</h2>
                <div id="existing-screenshot"></div>
                <div id="upload-area">
                    <div class="file-upload" id="file-drop">
                        <input type="file" id="screenshot-input" accept="image/*">
                        <div class="file-upload-label">
                            <span>Click to upload</span> your Zelle screenshot
                        </div>
                    </div>
                    <button class="btn btn-primary" id="upload-btn" style="margin-top:0.75rem; display:none">Upload Screenshot</button>
                </div>
            </div>

            <div id="modify-section" style="display:none">
                <div class="card">
                    <h2>Modify Order</h2>
                    <div class="form-group">
                        <label>Change Ticket Type</label>
                        <div class="radio-group" id="modify-ticket-options"></div>
                    </div>
                    <button class="btn btn-primary" id="save-btn">Save Changes</button>
                </div>

                <button class="btn btn-danger" id="cancel-btn" style="margin-top:0.75rem">Cancel Order</button>
            </div>

            <button class="btn btn-secondary" id="back-btn" style="margin-top:1rem">Look Up Another Order</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/status.js"></script>
</body>
</html>
